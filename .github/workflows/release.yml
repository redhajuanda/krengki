name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          EXT=""
          [ "${{ matrix.os }}" = "windows" ] && EXT=".exe"
          go build \
            -ldflags="-s -w -X github.com/redhajuanda/krengki/cmd.Version=${{ github.ref_name }}" \
            -o "krengki-${{ matrix.os }}-${{ matrix.arch }}${EXT}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: krengki-${{ matrix.os }}-${{ matrix.arch }}
          path: krengki-${{ matrix.os }}-${{ matrix.arch }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
